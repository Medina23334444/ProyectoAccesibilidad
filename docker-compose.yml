version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_backend
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "python manage.py migrate &&
             gunicorn djangoProject1.wsgi:application --bind 0.0.0.0:8000"
    # Ya NO expone el puerto 8000 directamente — solo nginx habla con él
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue_frontend
    expose:
      - "80"
    depends_on:
      - backend

  # NUEVO: Proxy inverso con TLS 1.3
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"       # Redirige a HTTPS
      - "443:443"     # HTTPS con TLS 1.3
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  media_data:
  reportes_data: